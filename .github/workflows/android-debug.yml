name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle (Wrapper 8.2)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Decode google-services.json
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_SECRET" ]; then
            echo "$FIREBASE_SECRET" | base64 --decode > app/google-services.json
            echo "✅ Firebase config restored."
          else
            echo "⚠️ No Firebase secret found. Creating dummy file for build."
            echo '{"project_info":{}}' > app/google-services.json
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smartguard-debug
          path: app/build/outputs/apk/debug/*.apk

      # (اختياري) إذا أردت إصدار Release لاحقاً، يمكنك إضافة أسرار (secrets) لملف التوقيع