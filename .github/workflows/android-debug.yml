name: Build APK & AAB

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ الانتقال إلى مجلد android
      - name: Change to android directory
        run: cd android

      # ✅ إنشاء Gradle Wrapper داخل مجلد android
      - name: Create Gradle Wrapper 8.14.3
        working-directory: ./android
        run: |
          mkdir -p gradle/wrapper
          
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.14.3-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar
          
          curl -L -o gradlew \
            https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradlew
          
          curl -L -o gradlew.bat \
            https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradlew.bat
          
          chmod +x gradlew

      # ✅ إنشاء variables.gradle (داخل مجلد android)
      - name: Create missing variables.gradle
        working-directory: ./android
        run: |
          cat > variables.gradle << 'EOF'
          ext {
              compileSdkVersion = 34
              minSdkVersion = 24
              targetSdkVersion = 34
              versionCode = 1
              versionName = "1.0"
          }
          EOF

      # ✅ إنشاء google-services.json (داخل android/app)
      - name: Add Firebase config
        working-directory: ./android
        run: |
          mkdir -p app
          echo '${{ secrets.FIREBASE_JSON }}' > app/google-services.json

      # ✅ Build Debug APK (من داخل مجلد android)
      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      # ✅ Build Debug AAB (من داخل مجلد android)
      - name: Build AAB
        working-directory: ./android
        run: ./gradlew bundleDebug

      # ✅ رفع APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      # ✅ رفع AAB
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: debug-aab
          path: android/app/build/outputs/bundle/debug/*.aab