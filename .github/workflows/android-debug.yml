name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Change to android directory
        run: |
          cd android
          echo "Working directory: $(pwd)"
          ls -la

      - name: Setup Gradle Wrapper (if missing)
        run: |
          cd android
          if [ ! -f "gradlew" ]; then
            echo "Gradle wrapper not found, creating..."
            gradle wrapper --gradle-version 8.2
          fi
          chmod +x gradlew

      - name: Decode google-services.json
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cd android
          if [ -n "$FIREBASE_SECRET" ]; then
            echo "$FIREBASE_SECRET" | base64 --decode > app/google-services.json
            echo "✅ Firebase config restored."
          else
            echo "⚠️ No Firebase secret found. Creating dummy file."
            echo '{"project_info":{}}' > app/google-services.json
          fi

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smartguard-debug
          path: android/app/build/outputs/apk/debug/*.apk