name: Build Android Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # ⚠️ تأكد أن الاسم مطابق 100% داخل GitHub
    environment: Environments

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Install Gradle
      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      # 4. Debug Keystore
      - name: Create Debug Keystore
        run: |
          mkdir -p ~/.android
          mkdir -p ~/.config/.android

          keytool -genkeypair \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android,O=Android,C=US"

          cp ~/.android/debug.keystore ~/.config/.android/debug.keystore

      # 5. Firebase config (FIXED)
      - name: Setup Firebase config
        run: |
          cd android
          mkdir -p app

          if [ -z "${{ secrets.FIREBASE_JSON }}" ]; then
            echo "❌ FIREBASE_JSON is missing"
            exit 1
          fi

          printf "%s" "${{ secrets.FIREBASE_JSON }}" > app/google-services.json

          echo "✅ Firebase config created"

      # 6. Gradle wrapper
      - name: Setup Gradle Wrapper
        run: |
          cd android

          if [ ! -f "gradlew" ]; then
            echo "⚠️ generating wrapper..."
            gradle wrapper --gradle-version 8.2
          fi

          chmod +x gradlew

      # 7. Build APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # 8. Show result
      - name: Show APK
        run: find android -name "*.apk"

      # 9. Upload
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smartguard-debug
          path: android/app/build/outputs/apk/debug/*.apk