name: Build Android Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # 🔴 ربط الـ Environment هنا (مهم جدًا)
    environment: Environments

    steps:
      # 1. تحميل المشروع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. تثبيت Gradle (لإنشاء wrapper إذا لزم)
      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      # 4. إنشاء Debug Keystore
      - name: Create Debug Keystore
        run: |
          mkdir -p ~/.android
          mkdir -p ~/.config/.android

          keytool -genkeypair \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android,O=Android,C=US"

          cp ~/.android/debug.keystore ~/.config/.android/debug.keystore

      # 5. إعداد Firebase (من Environment Secret)
      - name: Setup Firebase config
        run: |
          cd android
          mkdir -p app

          if [ -z "${{ secrets.FIREBASE_JSON }}" ]; then
            echo "❌ FIREBASE_JSON not found in Environment"
            exit 1
          fi

          cat <<EOF > app/google-services.json
${{ secrets.FIREBASE_JSON }}
EOF

          echo "✅ Firebase config created"

      # 6. إنشاء Gradle Wrapper إذا غير موجود
      - name: Setup Gradle Wrapper
        run: |
          cd android

          if [ ! -f "gradlew" ]; then
            echo "⚠️ gradlew not found → generating..."
            gradle wrapper --gradle-version 8.2
          else
            echo "✅ gradlew exists"
          fi

          chmod +x gradlew

      # 7. Build Debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # 8. عرض APK
      - name: Show APK
        run: find android -name "*.apk"

      # 9. رفع APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smartguard-debug
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/app/build/outputs/apk/debug/*.apk