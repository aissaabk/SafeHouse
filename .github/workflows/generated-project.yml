name: إنشاء مشروع SmartGuard تلقائياً

on:
  workflow_dispatch:    # يسمح بالتشغيل اليدوي من متصفح الهاتف

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # ضروري لدفع الملفات إلى المستودع

    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: تشغيل سكريبت إنشاء المشروع
        run: |
          # سيتم إنشاء جميع الملفات هنا
          bash github/scripts/generate_project.sh

      - name: دفع التغييرات إلى المستودع
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 إنشاء تلقائي لمشروع SmartGuard"
          git push