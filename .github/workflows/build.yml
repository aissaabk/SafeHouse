name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode google-services.json
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_SECRET" ]; then
            echo "$FIREBASE_SECRET" | base64 --decode > app/google-services.json
          else
            echo "⚠️ No Firebase secret found. Create a dummy file to pass build."
            echo '{"project_info":{}}' > app/google-services.json
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smartguard-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Build Release APK (if keystore available)
        if: secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          ./gradlew assembleRelease
          -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks
          -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD
          -Pandroid.injected.signing.key.alias=$KEY_ALIAS
          -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload Release APK
        if: success() && secrets.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: smartguard-release
          path: app/build/outputs/apk/release/*.apk