name: Build Android Debug (Firebase)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. تحميل المشروع
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
     - name: Setup Gradle
       uses: gradle/actions/setup-gradle@v3
     - name: Build Debug APK
       run: ./gradlew assembleDebug
      # 3. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. وضع google-services.json
      - name: Setup Firebase config
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: |
          mkdir -p android/app

          if [ -n "$FIREBASE_JSON" ]; then
            echo "$FIREBASE_JSON" | base64 --decode > android/app/google-services.json
          else
            echo "⚠️ No Firebase config found, creating dummy file"
            echo '{"project_info":{}}' > android/app/google-services.json
          fi

      # 5. Gradle check (اختياري)
      - name: Gradle check
        run: |
          cd android
          chmod +x gradlew
          ./gradlew tasks

      # 6. بناء Debug APK (موقّع تلقائياً)
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 7. عرض الملف
      - name: Show APK
        run: find android -name "*.apk"

      # 8. رفع APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk