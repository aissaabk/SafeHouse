name: Build Android Debug (Firebase)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. تحميل المشروع
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 5. Firebase config
      - name: Setup Firebase config
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: |
          mkdir -p android/app

          if [ -n "$FIREBASE_JSON" ]; then
            echo "$FIREBASE_JSON" | base64 --decode > android/app/google-services.json
          else
            echo '{"project_info":{}}' > android/app/google-services.json
          fi

      # 6. Debug project structure
      - name: Debug files
        run: |
          ls -la
          echo "----"
          ls -la android || echo "no android folder"

      # 7. Gradle check
      - name: Gradle check
        run: |
          cd android
          chmod +x gradlew
          ./gradlew tasks

      # 8. Build Debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 9. Show APK
      - name: Show APK
        run: find android -name "*.apk"

      # 10. Upload APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk