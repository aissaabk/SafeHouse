- name: Generate SHA keys (Clean)
  run: |
    echo "📁 Creating debug keystore..."

    mkdir -p ~/.android

    keytool -genkeypair \
      -keystore ~/.android/debug.keystore \
      -storepass android \
      -alias androiddebugkey \
      -keypass android \
      -keyalg RSA \
      -keysize 2048 \
      -validity 10000 \
      -dname "CN=Android,O=Android,C=US"

    echo "📂 Running Gradle signingReport..."

    cd android

    chmod +x gradlew || true

    ./gradlew signingReport