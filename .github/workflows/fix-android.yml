name: Build Android Debug (Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. تحميل المشروع
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 5. Debug structure (مهم جدًا)
      - name: Debug project structure
        run: |
          echo "===== ROOT ====="
          ls -la
          echo "===== ANDROID ====="
          ls -la android || echo "❌ android folder not found"

      # 6. إنشاء gradlew إذا غير موجود
      - name: Generate Gradle Wrapper if missing
        run: |
          cd android

          if [ ! -f "gradlew" ]; then
            echo "⚠️ gradlew not found → generating..."
            gradle wrapper
          else
            echo "✅ gradlew exists"
          fi

      # 7. إعطاء صلاحية التنفيذ
      - name: Grant permission
        run: |
          cd android
          chmod +x gradlew

      # 8. إضافة Firebase config
      - name: Setup Firebase config
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: |
          mkdir -p android/app

          if [ -n "$FIREBASE_JSON" ]; then
            echo "$FIREBASE_JSON" | base64 --decode > android/app/google-services.json
          else
            echo "⚠️ No Firebase config found → creating dummy"
            echo '{"project_info":{}}' > android/app/google-services.json
          fi

      # 9. اختبار Gradle
      - name: Gradle check
        run: |
          cd android
          ./gradlew tasks

      # 10. بناء Debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 11. عرض الناتج
      - name: Show APK
        run: find android -name "*.apk"

      # 12. رفع APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk