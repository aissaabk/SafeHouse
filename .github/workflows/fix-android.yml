name: Android Build Debug (Stable CI)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Java (مهم لـ Android 8+)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Gradle (بديل gradlew + wrapper)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. Debug structure (مهم جدًا)
      - name: Show project structure
        run: |
          echo "📁 ROOT"
          ls -la

          echo "📁 ANDROID"
          ls -la android || echo "❌ android folder missing"

      # 5. Firebase config (اختياري)
      - name: Setup Firebase
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: |
          mkdir -p android/app

          if [ -n "$FIREBASE_JSON" ]; then
            echo "$FIREBASE_JSON" | base64 --decode > android/app/google-services.json
            echo "✅ Firebase config added"
          else
            echo "⚠️ No