name: Generate SHA Keys (Android Clean)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. إنشاء debug keystore
      - name: Create Debug Keystore
        run: |
          mkdir -p ~/.android

          keytool -genkeypair \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android,O=Android,C=US"

      # 4. الدخول لمجلد android الصحيح
      - name: Generate SHA keys
        run: |
          echo "📁 Root structure:"
          ls -R

          cd android

          echo "📂 Android folder:"
          ls -la

          echo "🚀 Running signingReport..."
          gradle signingReport