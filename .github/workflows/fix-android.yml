name: Auto Fix Android Structure

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Debug (مهم جدًا لمعرفة هل workflow يعمل)
      - name: Debug start
        run: |
          echo "🚀 Workflow started"
          pwd
          ls -la

      # 3. إنشاء مجلد Android
      - name: Create Android structure
        run: |
          echo "🔧 Creating Android structure..."

          mkdir -p android/app/src/main/java/com/example/app
          mkdir -p android/app/src/main/res

          cat > android/settings.gradle <<EOF
include ':app'
EOF

          cat > android/build.gradle <<EOF
plugins {
    id 'com.android.application' version '8.2.0' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
}
EOF

          cat > android/app/build.gradle <<EOF
plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace "com.example.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
EOF

      # 4. تحقق من الملفات
      - name: Show structure
        run: |
          echo "📁 Android folder:"
          ls -R android

      # 5. Commit (مهم)
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git status

          git diff --cached --quiet || git commit -m "🔧 Auto generate Android structure"

          git push